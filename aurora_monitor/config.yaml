# Aurora Monitor Configuration
# Shared config for all community source monitors

github:
  repo: ErikEvenson/aurora-manual
  discussion_category_id: DIC_kwDORAJjec4C2k26  # Monitor Digests
  discussion_category_slug: monitor-digests
  cross_ref_targets:
    forum: 1288   # Aurora Forums monitor issue
    youtube: 1289  # YouTube monitor issue

reddit:
  subreddits:
    - aurora4x
    - aurora
  user_agent: "aurora-manual-monitor/1.0 (github.com/ErikEvenson/aurora-manual)"
  rate_limit_delay: 2.5  # seconds between requests (Reddit allows ~30/min unauthenticated)
  max_retries: 5
  backfill_max_pages: 10  # ~1000 posts (100 per page)

  # Flairs to skip — these are noise for verification matching
  skip_flairs:
    - "Captain's Log"   # AARs — long narratives, not mechanics testing
    - "Captains' Log"   # Alternate spelling
    - "Skunkworks"      # Ship designs — no verification content
    - "Out of this World"  # Screenshots and memes
    - "META"            # Subreddit meta discussion

matching:
  # Fuzzy match thresholds (thefuzz token_set_ratio)
  thresholds:
    high: 80
    medium: 60
    low: 40

  # Known authors with reputation bonuses
  known_authors:
    SteveWalmsley:
      bonus: 30
      note: "Aurora developer"

  # Multi-match penalty per additional match beyond the first
  multi_match_penalty: 10

  # Keywords by priority tier
  keywords:
    high:
      - beam fire control
      - missile fire control
      - annual failure rate
      - maintenance supply
      - hull space
      - jump point
      - trans-newtonian
      - colony cost
      - construction factory
      - fuel refinery
      - terraforming
      - ground forces
      - thermal signature
      - cross section
      - electronic countermeasures
      - point defense
      - fire control
      - sensor range
      - survey point
      - geological survey
      - gravitational survey

    medium:
      - aurora c#
      - aurora 4x
      - game mechanics
      - combat resolution
      - damage calculation
      - armor penetration
      - shield strength
      - engine power
      - fuel consumption
      - research points
      - build points
      - mineral cost
      - crew quarters
      - engineering spaces
      - magazine
      - hangar
      - shipyard
      - orbital mining
      - population growth
      - unrest
      - diplomacy
      - espionage
      - commander
      - fleet order
      - waypoint

    # Aurora-specific terms for relevance detection
    aurora_terms:
      - aurora
      - trans-newtonian
      - duranium
      - neutronium
      - corbomite
      - tritanium
      - boronide
      - mercassium
      - vendarite
      - sorium
      - uridium
      - corundium
      - gallicite
      - PDC
      - CIWS
      - NPR
      - spoiler race
      - precursor
      - jump gate
      - lagrange point

